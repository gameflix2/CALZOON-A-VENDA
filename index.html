
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Clone</title>
  <style>
    :root {
      --whatsapp-green: #25D366;
      --whatsapp-dark: #075E54;
      --bg-color: #111B21;
      --chat-bg: #0B141A;
      --msg-sent: #005C4B;
      --msg-received: #202C33;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #000;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .phone {
      width: 380px;
      height: 720px;
      background: #000;
      border: 12px solid #111;
      border-radius: 50px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      position: relative;
    }

    .whatsapp {
      width: 100%;
      height: 100%;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--whatsapp-dark);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 18px;
    }

    .tabs {
      background: var(--whatsapp-dark);
      display: flex;
      color: #8a9ba5;
      font-size: 14px;
      border-bottom: 1px solid #1f2a32;
    }

    .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; }
    .tab.active { color: white; border-bottom: 3px solid var(--whatsapp-green); }

    .chat-list { flex: 1; overflow-y: auto; background: var(--chat-bg); }

    .chat-item {
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #1f2a32;
      cursor: pointer;
    }

    .avatar { width: 52px; height: 52px; border-radius: 50%; background: #333; flex-shrink: 0; object-fit: cover; }

    .chat-info { flex: 1; min-width: 0; }
    .chat-name { color: white; font-weight: 500; margin-bottom: 2px; font-size: 16px; }
    .last-message { color: #8696a0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-meta { text-align: right; font-size: 12px; color: #8696a0; min-width: 65px; }
    .unread {
      background: var(--whatsapp-green);
      color: #0b141a;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
      font-weight: bold;
      margin-top: 4px;
    }

    .chat-screen { display: none; flex-direction: column; height: 100%; background: #0B141A; }
    .chat-header { background: var(--whatsapp-dark); padding: 10px 16px; display: flex; align-items: center; gap: 12px; color: white; }
    .chat-messages { flex: 1; padding: 20px 12px; overflow-y: auto; background-color: #0b141a; }

    .message { max-width: 75%; margin-bottom: 12px; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; }
    .message.sent { background: var(--msg-sent); align-self: flex-end; color: white; }
    .message.received { background: var(--msg-received); align-self: flex-start; color: white; }

    .input-bar { background: #1f2a32; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
    .input-container { flex: 1; background: #2a3942; border-radius: 30px; padding: 8px 16px; }
    input { background: none; border: none; outline: none; color: white; width: 100%; }

    .bottom-nav { background: #1f2a32; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a3942; }
    .nav-item { text-align: center; color: #8696a0; font-size: 12px; }
    .nav-item.active { color: var(--whatsapp-green); }
  </style>
</head>
<body>

<div class="phone">
  <div class="whatsapp">
    <!-- Tela de Conversas -->
    <div id="screen-chats" style="height: 100%; display: flex; flex-direction: column;">
      <div class="header">

      <div class="tabs">

function openChat(chat) {
  document.getElementById('screen-chats').style.display = 'none';
  document.getElementById('screen-chat').style.display = 'flex';
  document.getElementById('chat-name').innerText = chat.name;
  document.getElementById('chat-avatar').src = chat.avatar;
  const msgBox = document.getElementById('chat-messages');
  msgBox.innerHTML = `<div class="message received">${chat.lastMsg}</div>`;
}

function backToChats() {
  document.getElementById('screen-chats').style.display = 'flex';
